; Cyclops firmware — multi-target. Shared lib (header-only) in lib/cyclops_shared.
; Screen selected per env via -DSCREEN_ST7735 | -DSCREEN_128x64 | -DSCREEN_128x32 | -DSCREEN_TRANSPARENT_151.
; Build matrix:
;   pio run -e xiao_st7735 | xiao_128x64 | xiao_128x32 | xiao_128x32_i2c | xiao_transparent_151
;   pio run -e native_test | native_proto
; (Arduino/AVR target retired; dev sim is shells/hud_sim.py.)
[env]
monitor_speed = 115200

[env:xiao_st7735]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DCYCLOPS_XIAO -DSCREEN_ST7735 -Ilib/cyclops_shared/include
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit ST7735 and ST7789 Library@^1.10, h2zero/NimBLE-Arduino@^1.4
build_src_filter = +<main.cpp> +<../xiao/src/sd_log.cpp> +<../xiao/src/ring_ble.cpp> +<../xiao/src/imu.cpp> +<../xiao/src/camera_capture.cpp>

[env:xiao_128x64]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DCYCLOPS_XIAO -DSCREEN_128x64 -Ilib/cyclops_shared/include
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit SSD1306@^2.5, h2zero/NimBLE-Arduino@^1.4
build_src_filter = +<main.cpp> +<../xiao/src/sd_log.cpp> +<../xiao/src/ring_ble.cpp> +<../xiao/src/imu.cpp> +<../xiao/src/camera_capture.cpp>

[env:xiao_128x32]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DCYCLOPS_XIAO -DSCREEN_128x32 -Ilib/cyclops_shared/include
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit SSD1306@^2.5, h2zero/NimBLE-Arduino@^1.4
build_src_filter = +<main.cpp> +<../xiao/src/sd_log.cpp> +<../xiao/src/ring_ble.cpp> +<../xiao/src/imu.cpp> +<../xiao/src/camera_capture.cpp>

[env:xiao_128x32_i2c]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DCYCLOPS_XIAO -DSCREEN_128x32_I2C -DENABLE_RING=1 -DENABLE_IMU=1 -Ilib/cyclops_shared/include
build_src_filter = +<main.cpp> +<../xiao/src/sd_log.cpp> +<../xiao/src/ring_ble.cpp> +<../xiao/src/imu.cpp> +<../xiao/src/camera_capture.cpp>
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit SSD1306@^2.5, h2zero/NimBLE-Arduino@^1.4

[env:xiao_transparent_151]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DCYCLOPS_XIAO -DSCREEN_TRANSPARENT_151 -DENABLE_RING=1 -DENABLE_IMU=1 -Ilib/cyclops_shared/include
build_src_filter = +<main.cpp> +<../xiao/src/sd_log.cpp> +<../xiao/src/ring_ble.cpp> +<../xiao/src/imu.cpp> +<../xiao/src/camera_capture.cpp>
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit SSD1306@^2.5, h2zero/NimBLE-Arduino@^1.4

[env:xiao_transparent_151_i2c]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DCYCLOPS_XIAO -DSCREEN_TRANSPARENT_151_I2C -DENABLE_RING=1 -DENABLE_IMU=1 -Ilib/cyclops_shared/include
build_src_filter = +<main.cpp> +<../xiao/src/sd_log.cpp> +<../xiao/src/ring_ble.cpp> +<../xiao/src/imu.cpp> +<../xiao/src/camera_capture.cpp>
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit SSD1306@^2.5, h2zero/NimBLE-Arduino@^1.4

; Hardware bringup selftest (SD, OV2640 camera, PDM mic) — prints [sd]/[cam]/
; [mic] results over serial and dumps one JPEG as base64. No HUD, no BLE.
; Add -DSELFTEST_SD_FORMAT=1 to format (erase) an unmountable SD card.
[env:xiao_selftest]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DBOARD_HAS_PSRAM
build_src_filter = -<main.cpp> +<../selftest/main.cpp>

; CyclUno — Cyclops dev unit on an Arduino Uno (buttons + scrollwheel + OLED
; + LEDs, wired serial to the brain). Text-mode OLED driver: no framebuffer,
; because the ATmega328P has 2 KB of SRAM total.
[env:cycluno]
platform = atmelavr
board = uno
framework = arduino
build_flags = -Ilib/cyclops_shared/include -Ishared/include
build_src_filter = -<main.cpp> +<../cycluno/main.cpp>
lib_deps = greiman/SSD1306Ascii@^1.3

[env:diag]
platform = atmelavr
board = uno
framework = arduino
build_flags = -Ilib/cyclops_shared/include -Ishared/include
build_src_filter = -<main.cpp> +<../diag/main.cpp>
lib_deps = greiman/SSD1306Ascii@^1.3

[env:native_test]
platform = native
build_src_filter = +<../shared/test_hud.cpp>
build_flags = -DCYCLOps_HOST -I../shared/include -I../lib/cyclops_shared/include

[env:native_proto]
platform = native
build_src_filter = +<../shared/test_shared.cpp>
build_flags = -DCYCLOps_HOST -I../shared/include -I../lib/cyclops_shared/include
