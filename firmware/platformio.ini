; Cyclops firmware — multi-target. Shared lib (header-only) in lib/cyclops_shared.
; Screen selected per env via -DSCREEN_ST7735 | -DSCREEN_128x64 | -DSCREEN_128x32.
; Build matrix:
;   pio run -e arduino_st7735 | arduino_128x64 | arduino_128x32
;   pio run -e xiao_st7735    | xiao_128x64    | xiao_128x32
;   pio run -e native_test
[env]
monitor_speed = 115200

[env:arduino_st7735]
platform = atmelavr
board = nanoatmega328
framework = arduino
build_flags = -DCYCLOPS_ARDUINO -DSCREEN_ST7735 -Ilib/cyclops_shared/include
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit ST7735 and ST7789 Library@^1.10

[env:arduino_128x64]
platform = atmelavr
board = nanoatmega328
framework = arduino
build_flags = -DCYCLOPS_ARDUINO -DSCREEN_128x64 -Ilib/cyclops_shared/include
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit SSD1306@^2.5

[env:arduino_128x32]
platform = atmelavr
board = nanoatmega328
framework = arduino
build_flags = -DCYCLOPS_ARDUINO -DSCREEN_128x32 -Ilib/cyclops_shared/include
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit SSD1306@^2.5

[env:xiao_st7735]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DCYCLOPS_XIAO -DSCREEN_ST7735 -Ilib/cyclops_shared/include
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit ST7735 and ST7789 Library@^1.10, h2zero/NimBLE-Arduino@^1.4

[env:xiao_128x64]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DCYCLOPS_XIAO -DSCREEN_128x64 -Ilib/cyclops_shared/include
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit SSD1306@^2.5, h2zero/NimBLE-Arduino@^1.4

[env:xiao_128x32]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DCYCLOPS_XIAO -DSCREEN_128x32 -Ilib/cyclops_shared/include
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit SSD1306@^2.5, h2zero/NimBLE-Arduino@^1.4

[env:xiao_128x32_i2c]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -DCYCLOPS_XIAO -DSCREEN_128x32_I2C -DENABLE_RING=1 -DENABLE_IMU=1 -Ilib/cyclops_shared/include
build_src_filter = +<main.cpp> +<../xiao/src/sd_log.cpp> +<../xiao/src/ring_ble.cpp> +<../xiao/src/imu.cpp>
lib_deps = adafruit/Adafruit GFX Library@^1.11, adafruit/Adafruit SSD1306@^2.5, h2zero/NimBLE-Arduino@^1.4

[env:native_test]
platform = native
build_src_filter = +<../shared/test_hud.cpp>
build_flags = -DCYCLOps_HOST -I../shared/include -I../lib/cyclops_shared/include

[env:native_proto]
platform = native
build_src_filter = +<../shared/test_shared.cpp>
build_flags = -DCYCLOps_HOST -I../shared/include -I../lib/cyclops_shared/include
