name: Build Cyclops Companion APK

on:
  push:
    branches: [master, main, cyclops]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [master, main, cyclops]
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Run :core unit tests (Kotlin protocol + bridge)
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: android
          gradle-version: '8.9'
          arguments: :core:test --stacktrace

      - name: Build debug APK
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: android
          gradle-version: '8.9'
          arguments: :app:assembleDebug --stacktrace

      - name: Build release APK (unsigned)
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: android
          gradle-version: '8.9'
          arguments: :app:assembleRelease --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: cyclops-companion-apks
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  firmware:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Native HUD/logic test (no hardware)
        run: |
          cd firmware
          pio run -e native_test

      - name: Compile XIAO target (ST7735)
        run: |
          cd firmware
          pio run -e xiao_st7735
