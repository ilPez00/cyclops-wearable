name: Cyclops CI

on:
  push:
    branches: [master, main, cyclops]
  pull_request:
    branches: [master, main, cyclops]
  workflow_dispatch:

jobs:
  host-gate:
    name: Firmware host gate (g++ — HUD + proto + OTA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HUD state-machine tests
        run: cd firmware && make test
      - name: Shared protocol + OTA tests
        run: cd firmware && make proto

  firmware:
    name: Firmware build matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [xiao_st7735, xiao_128x64, xiao_128x32, xiao_transparent_151]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}
        working-directory: firmware

  native:
    name: Native host tests (C++ logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build + run native tests
        run: |
          pio run -e native_test
          pio run -e native_proto
        working-directory: firmware

  python:
    name: Python suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run full zero-dep test suite
        run: python3 tests/run_tests.py tests/test_*.py
