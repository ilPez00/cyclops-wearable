name: Cyclops CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  firmware:
    name: Firmware build matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [arduino_st7735, arduino_128x64, arduino_128x32, xiao_st7735, xiao_128x64, xiao_128x32]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}
        working-directory: firmware

  native:
    name: Native host tests (C++ logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build + run native tests
        run: |
          pio run -e native_test
          pio run -e native_proto
        working-directory: firmware

  python:
    name: Python suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run zero-dep test suite
        run: python3 tests/run_tests.py tests/test_brain.py tests/test_device.py tests/test_v2.py tests/test_hud_bridge.py
